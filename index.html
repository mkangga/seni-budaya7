                    } else if (q.type === 'essay') {
                        quizHtml += `<div><input type="text" name="q${index}" class="w-full bg-white dark:bg-gray-600 border border-gray-300 dark:border-gray-500 rounded-md p-2 focus:ring-2 focus:ring-teal-500" placeholder="Ketik jawaban singkatmu..."></div>`;
                    }
                    quizHtml += `<div id="feedback-${index}" class="mt-3 text-sm transition-all duration-300 opacity-0 max-h-0 overflow-hidden"></div>`;
                    quizHtml += '</div>';
                });
                quizHtml += '</div>';
                quizContent.innerHTML = quizHtml;
                quizModal.classList.remove('hidden');
                setTimeout(() => quizModalContent.classList.remove('scale-95', 'opacity-0'), 10);
                submitQuizBtn.textContent = "Kumpulkan Jawaban";
                submitQuizBtn.disabled = false;
                submitQuizBtn.onclick = () => checkAnswers(id);

                quizContent.querySelectorAll('input[type="radio"]').forEach(radio => {
                    radio.addEventListener('change', (e) => {
                        const name = e.target.name;
                        document.querySelectorAll(`input[name="${name}"]`).forEach(r => {
                            r.parentElement.classList.remove('border-teal-500','bg-teal-50','dark:bg-teal-900/50');
                        });
                        e.target.parentElement.classList.add('border-teal-500','bg-teal-50','dark:bg-teal-900/50');
                    });
                });
            };

            function checkAnswers(id) {
                const quizData = contentData[id].quiz;
                let score = 0;
                quizData.forEach((q, index) => {
                    const questionBlock = document.getElementById(`question-${index}`);
                    const feedbackEl = document.getElementById(`feedback-${index}`);
                    const inputs = questionBlock.querySelectorAll(`input[name="q${index}"]`);
                    
                    let userAnswer = "";
                    let selectedLabel = null;

                    if (q.type === 'mc') {
                        const checkedInput = questionBlock.querySelector(`input[name="q${index}"]:checked`);
                        if (checkedInput) {
                            userAnswer = checkedInput.value;
                            selectedLabel = checkedInput.parentElement;
                        }
                    } else {
                        const essayInput = questionBlock.querySelector(`input[name="q${index}"]`);
                        userAnswer = essayInput.value.trim();
                        selectedLabel = essayInput;
                    }

                    inputs.forEach(input => input.disabled = true);
                    
                    let isCorrect = (q.type === 'mc') 
                        ? userAnswer.toLowerCase() === q.answer.toLowerCase()
                        : q.answer.toLowerCase().split(' ').every(word => userAnswer.toLowerCase().includes(word));
                    
                    feedbackEl.style.maxHeight = feedbackEl.scrollHeight + "px";
                    feedbackEl.classList.remove('opacity-0', 'max-h-0');

                    if (isCorrect) {
                        score++;
                        if(selectedLabel && q.type === 'mc') selectedLabel.classList.add('correct');
                        feedbackEl.innerHTML = `<div class="p-3 mt-2 rounded-lg bg-teal-50 dark:bg-teal-900/50 text-teal-800 dark:text-teal-200"><p class="font-bold"><i class="fas fa-check-circle mr-2"></i>Benar!</p><p>${q.explanation}</p></div>`;
                    } else {
                        if(selectedLabel && q.type === 'mc') selectedLabel.classList.add('incorrect');
                        // Highlight the correct answer for MCQs
                        if(q.type === 'mc'){
                            const correctLabel = Array.from(inputs).find(i => i.value.toLowerCase() === q.answer.toLowerCase()).parentElement;
                            correctLabel.classList.add('correct');
                        }
                        feedbackEl.innerHTML = `<div class="p-3 mt-2 rounded-lg bg-rose-50 dark:bg-rose-900/50 text-rose-800 dark:text-rose-200"><p class="font-bold"><i class="fas fa-times-circle mr-2"></i>Kurang Tepat.</p><p>Jawaban yang benar: <strong>${q.answer}</strong>. ${q.explanation}</p></div>`;
                    }
                });
                
                let scoreDisplay = document.getElementById('score-display');
                if (scoreDisplay) scoreDisplay.remove();
                scoreDisplay = document.createElement('div');
                scoreDisplay.id = 'score-display';
                scoreDisplay.innerHTML = `<h4 class="text-2xl font-bold mt-6 text-center">Skor Akhir: ${score} dari ${quizData.length}</h4>`;
                document.getElementById('quiz-form').insertAdjacentElement('afterend', scoreDisplay);
                
                submitQuizBtn.textContent = "Tutup";
                submitQuizBtn.onclick = () => {
                    quizModalContent.classList.add('scale-95', 'opacity-0');
                    setTimeout(() => quizModal.classList.add('hidden'), 300);
                }
            }
            
            closeQuizModal.addEventListener('click', () => {
                quizModalContent.classList.add('scale-95', 'opacity-0');
                setTimeout(() => quizModal.classList.add('hidden'), 300);
            });
            
            window.changeStep = (containerId, direction) => {
                const container = document.getElementById(containerId);
                if (!container) return;
                const steps = container.querySelectorAll('.interactive-step');
                let currentIndex = currentStepIndices[containerId] || 0;
                steps[currentIndex].style.display = 'none';
                currentIndex = (currentIndex + direction + steps.length) % steps.length;
                steps[currentIndex].style.display = 'block';
                currentStepIndices[containerId] = currentIndex;
            };

            searchInput.addEventListener('input', () => {
                const query = searchInput.value.toLowerCase();
                if (query.length < 2) {
                    searchResults.classList.add('hidden');
                    return;
                }
                let resultsHtml = '<div class="py-1">';
                let count = 0;
                for (const id in contentData) {
                    if(id === 'home' || id.split('-').length < 2) continue;
                    const item = contentData[id];
                    if (item.title.toLowerCase().includes(query) || item.category.toLowerCase().includes(query)) {
                        resultsHtml += `<a href="#" class="nav-link block px-4 py-2 text-sm text-gray-700 dark:text-gray-200 hover:bg-gray-100 dark:hover:bg-gray-700" data-id="${id}"><span class="font-semibold">${item.category}:</span> ${item.title.split(': ')[1]}</a>`;
                        count++;
                    }
                }
                resultsHtml += '</div>';

                if (count > 0) {
                    searchResults.innerHTML = resultsHtml;
                    searchResults.classList.remove('hidden');
                } else {
                    searchResults.innerHTML = `<div class="px-4 py-2 text-sm text-gray-500">Tidak ada hasil.</div>`;
                    searchResults.classList.remove('hidden');
                }
            });

            document.addEventListener('click', (e) => {
                if (!e.target.closest('#search-input') && !e.target.closest('#search-results')) {
                    searchResults.classList.add('hidden');
                }
            });
            
            generateNav();
            renderContent('home');
        });
    </script>

</body>
</html>
